<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Checkbox</title>
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/custom-checkbox.css" />
  </head>
  <body>
    <div class="wrapper">
      <!-- Checkbox -->
      <div class="column">
        <h4 class="title">Checkbox</h4>
        <input type="checkbox" id="checkbox" hidden />
        <label for="checkbox" class="label-checkbox"></label>
      </div>
      <!-- Radio -->
      <div class="column">
        <h4 class="title">Radio</h4>
        <input type="radio" id="radio" hidden />
        <label for="radio" class="label-radio"></label>
      </div>
      <!-- Switch -->
      <div class="column">
        <h4 class="title">Switch</h4>
        <input type="checkbox" id="switch" hidden />
        <label for="switch" class="label-switch"></label>
      </div>
    </div>
  </body>
</html>
